name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Normalize image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render Hosty app manifest
        run: |
          node scripts/render-app-manifest.mjs \
            --repository "$IMAGE_NAME" \
            --tag "sha-${GITHUB_SHA::7}" \
            --output dist/app-manifest/manifest.json

      - name: Upload Hosty app manifest
        uses: actions/upload-artifact@v4
        with:
          name: hosty-app-manifest
          path: dist/app-manifest/manifest.json

      - name: Publish latest Hosty app manifest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANIFEST_RELEASE_TAG: latest
          MANIFEST_RELEASE_TITLE: Latest Hosty app manifest
          MANIFEST_ASSET_PATH: dist/app-manifest/manifest.json
        run: |
          if gh release view "$MANIFEST_RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$MANIFEST_RELEASE_TAG" "$MANIFEST_ASSET_PATH" --clobber
          else
            gh release create "$MANIFEST_RELEASE_TAG" "$MANIFEST_ASSET_PATH" \
              --target "$GITHUB_SHA" \
              --title "$MANIFEST_RELEASE_TITLE" \
              --notes "Mutable Hosty app manifest channel for the latest Project Manager image." \
              --latest=false
          fi
