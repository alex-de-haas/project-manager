name: Dependabot auto-merge

# Turns Hosty App SDK bumps into no-touch updates, per the platform's SDK update model
# (docker-host docs/ideas/hosty-app-sdk.md, decision 13): the app tracks the current SDK,
# and the bump chore is eliminated by automation rather than by floating versions.
#
# Deliberately narrow: only PRs authored by Dependabot, and only those in the `hosty-sdk`
# group (see .github/dependabot.yml). That group is restricted to minor/patch, so a future
# 1.0 major falls outside it and still lands as a PR someone has to read.
#
# TWO REPOSITORY SETTINGS ARE REQUIRED for this to behave as intended:
#   1. Settings > General > "Allow auto-merge" -- without it, the merge step fails.
#   2. Branch protection on `main` with the CI job marked as a required check. Without
#      required checks a PR is mergeable the moment it opens, and auto-merge merges it
#      immediately -- the "on green CI" half of the contract silently disappears. The
#      protection rule is what makes CI a gate rather than a bystander.
#      Note CI here is path-filtered; an SDK bump touches package.json and
#      package-lock.json, both of which are in that filter, so the check does run.
#
# Security notes: this runs on `pull_request` (never `pull_request_target`) and never
# checks out or executes the PR's code, so the elevated permissions below are not exposed
# to anything the branch contains. Authorship is taken from the PR author, which a branch
# cannot forge.

on: pull_request

permissions: {}

jobs:
  auto-merge:
    name: auto-merge (hosty-sdk)
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.metadata.outputs.dependency-group == 'hosty-sdk'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
